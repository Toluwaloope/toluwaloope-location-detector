name: Build and Deploy to Toluwaloope.LocationDetector.Api Azure Function App

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment.'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './src/Toluwaloope.LocationDetector.Api'
  TERRAFORM_PATH: './infrastructure/terraform'
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'
  TF_VERSION: '1.6.0'

permissions:
  contents: read
  id-token: write

jobs:
  provision-infrastructure:
    runs-on: ubuntu-latest
    name: Provision Toluwaloope.LocationDetector.Api's Infrastructure
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_BACKEND_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    outputs:
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
      function_app_name: ${{ steps.tf-outputs.outputs.function_app_name }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get Terraform Absolute Path
        id: tfpath
        shell: bash
        run: |
          TF=$(which terraform)
          echo "TF_EXE=$TF" >> $GITHUB_ENV
          echo "Terraform located at: $TF"

      - name: Azure login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          terraform init

      - name: Terraform Workspace Setup
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          WORKSPACE="${{ github.event.inputs.environment }}"

          # Check if workspace exists and select it, otherwise create new one
          if terraform workspace select "$WORKSPACE" 2>/dev/null; then
            echo "Selected existing workspace: $WORKSPACE"
          else
            echo "Creating new workspace: $WORKSPACE"
            terraform workspace new "$WORKSPACE"
          fi
          
          echo "Current workspace: $(terraform workspace show)"

      - name: Terraform Format Check
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          terraform fmt -check -recursive

      - name: Terraform Validate
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          terraform validate

      - name: Terraform Plan
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          TFVARS_FILE="${{ github.event.inputs.environment }}.tfvars"
          if [ ! -f "$TFVARS_FILE" ]; then
            echo "Error: tfvars file not found: $TFVARS_FILE"
            exit 1
          fi
          terraform plan -var-file="$TFVARS_FILE"

      - name: Terraform Apply
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          TFVARS_FILE="${{ github.event.inputs.environment }}.tfvars"
          terraform apply -var-file="$TFVARS_FILE" -auto-approve

      - name: Export Terraform Outputs
        id: tf-outputs
        shell: bash
        run: |
          cd "${{ env.TERRAFORM_PATH }}"
          
          # Capture terraform outputs and filter to clean lines only
          RESOURCE_GROUP_NAME=$(terraform output -raw resource_group_name 2>/dev/null)
          FUNCTION_APP_NAME=$(terraform output -raw function_app_name 2>/dev/null)

          # Output the values for verification
          echo "Resource Group: $RESOURCE_GROUP_NAME"
          echo "Function App: $FUNCTION_APP_NAME"
          
          # Write to GITHUB_OUTPUT
          echo "resource_group_name=$RESOURCE_GROUP_NAME" >> $GITHUB_OUTPUT
          echo "function_app_name=$FUNCTION_APP_NAME" >> $GITHUB_OUTPUT

      - name: Azure logout
        shell: bash
        run: az logout
        if: always()

  build:
    runs-on: ubuntu-latest
    name: Build Toluwaloope.LocationDetector.Api Project
    needs: provision-infrastructure
    outputs:
      artifact-name: ${{ steps.build.outputs.artifact-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Build project
        run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }}
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        id: build

      - name: Publish project
        run: dotnet publish --no-build --configuration ${{ env.CONFIGURATION }} --output ./publish
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Package for deployment
        shell: bash
        run: |
          cd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/publish"
          zip -r ../../../function-app.zip .
          echo "ARTIFACT_NAME=function-app.zip" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app-${{ github.sha }}
          path: function-app.zip
          retention-days: 5

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Toluwaloope.LocationDetector.Api
    needs: [provision-infrastructure, build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-${{ github.sha }}
          path: .

      - name: Azure login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ needs.provision-infrastructure.outputs.function_app_name }}
          package: ./function-app.zip

      - name: Verify Deployment
        shell: bash
        run: |
          echo "✓ Checking Azure Function App deployment status..."
          az functionapp show \
            --resource-group ${{ needs.provision-infrastructure.outputs.resource_group_name }} \
            --name ${{ needs.provision-infrastructure.outputs.function_app_name }} \
            --query "{state: state, defaultHostName: defaultHostName}"

      - name: Azure logout
        shell: bash
        run: az logout
        if: always()

  post-deployment-tests:
    needs: [provision-infrastructure, deploy]
    if: always() &&  needs.deploy.result == 'success'
    uses: ./.github/workflows/post-deployment-test.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      function_app_name: ${{ needs.provision-infrastructure.outputs.function_app_name }}
      resource_group_name: ${{ needs.provision-infrastructure.outputs.resource_group_name }}
      api_path: '/api/GetCallerInformation'

  notify:
    runs-on: ubuntu-latest
    name: Send Deployment Notification
    needs: [provision-infrastructure, build, deploy]
    if: always()

    steps:
      - name: Determine deployment status
        id: status
        shell: bash
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          
          if [ "$DEPLOY_RESULT" = "success" ] && [ "${{ needs.post-deployment-tests.result }}" = "success" ]; then
            echo "STATUS=✅ Deployment Successful" >> $GITHUB_ENV
            echo "ICON=✓" >> $GITHUB_ENV
          else
            echo "STATUS=❌ Deployment Failed" >> $GITHUB_ENV
            echo "ICON=✗" >> $GITHUB_ENV
          fi

      - name: Create deployment summary
        shell: bash
        run: |
          ENVIRONMENT=$(echo "${{ github.event.inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Deployment Summary
          
          **Status:** ${{ env.STATUS }}
          
          **Environment:** $ENVIRONMENT
          **Function App:** ${{ needs.provision-infrastructure.outputs.function_app_name }}
          **Resource Group:** ${{ needs.provision-infrastructure.outputs.resource_group_name }}
          
          **Details:**
          - **Commit:** ${{ github.sha }}
          - **Triggered by:** ${{ github.actor }}
          - **Timestamp:** $TIMESTAMP
          
          **Workflow Results:**
          - Build: ${{ needs.build.result }}
          - Infrastructure: success
          - Deploy: ${{ needs.deploy.result }}
          - Health Check: ${{ needs.post-deployment-tests.result }}
          
          EOF
