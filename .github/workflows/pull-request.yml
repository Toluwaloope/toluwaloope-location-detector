name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Scanning Toluwaloope.LocationDetector.Api for Vulnerabilities

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install security scanning tool
        run: dotnet tool install --global dotnet-sonarscanner
        continue-on-error: true

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src/Toluwaloope.LocationDetector.Api

      - name: Check for vulnerabilities in dependencies
        run: dotnet list package --vulnerable
        working-directory: ./src/Toluwaloope.LocationDetector.Api
        continue-on-error: true

  build-and-test:
    runs-on: ubuntu-latest
    name: Build Toluwaloope.LocationDetector.Api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src/Toluwaloope.LocationDetector.Api

      - name: Build project
        run: dotnet build --no-restore --configuration Release
        working-directory: ./src/Toluwaloope.LocationDetector.Api

      - name: Check code formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        working-directory: ./src/Toluwaloope.LocationDetector.Api
        continue-on-error: true

  validation:
    runs-on: ubuntu-latest
    name: Validate Pull Request Checks
    needs: [build-and-test, security-scan]
    if: always()

    steps:
      - name: Validate PR
        run: |
          echo "✓ Build and test validation completed"
          echo "✓ Code quality checks completed"
          echo "✓ Security scanning completed"
          echo "All checks have been executed. Review the results above."

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const buildStatus = '✓ Build and validation checks completed';
            
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: `## Workflow Summary\n\n${buildStatus}\n\n**Details:**\n- Build: Checking .NET 8.0 compilation\n- Code Quality: Verifying formatting and style\n- Security: Scanning dependencies\n\nPlease review any warnings or errors in the workflow logs.`,
              event: 'COMMENT'
            });
